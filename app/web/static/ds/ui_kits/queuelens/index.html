<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>QueueLens</title>
<link rel="stylesheet" href="/static/ds/styles.css?v=0.8.7">
<script src="/static/vendor/react.production.min.js"></script>
<script src="/static/vendor/react-dom.production.min.js"></script>
<script src="/static/vendor/babel.min.js"></script>
<script src="/static/vendor/lucide.js"></script>
<script src="/static/ds/ds-loader.js?v=0.8.7"></script>
<style>
  html, body { margin: 0; background: var(--slate-50); font-family: var(--font-ui); }
  * { box-sizing: border-box; }
  a { color: var(--text-link); } a:hover { color: var(--blue-700); }
</style>
</head>
<body>
<div id="root"></div>
<script>
window.__loadDS('/static/ds/');
window.QL = window.QL || {};
// Auto-refresh (data layer is fetched at load) — but never yank the page out from
// under a form or detail view: only reload while sitting on the dashboard.
setInterval(function () {
  var settings = (window.QL.serverSettings || {}).ui || {};
  if (settings.auto === false) return; // Auto Refresh switched off in General Settings
  var el = document.querySelector('[data-screen-label]');
  if (el && el.getAttribute('data-screen-label') === 'Dashboard') location.reload();
}, 30000);
</script>
<script src="/static/ds/ui_kits/queuelens/data.js?v=0.8.7"></script>
<script type="text/babel" src="/static/ds/ui_kits/queuelens/shared.jsx?v=0.8.7"></script>
<script type="text/babel" src="/static/ds/ui_kits/queuelens/Dashboard.jsx?v=0.8.7"></script>
<script type="text/babel" src="/static/ds/ui_kits/queuelens/Queues.jsx?v=0.8.7"></script>
<script type="text/babel" src="/static/ds/ui_kits/queuelens/Messages.jsx?v=0.8.7"></script>
<script type="text/babel" src="/static/ds/ui_kits/queuelens/Wizard.jsx?v=0.8.7"></script>
<script type="text/babel" src="/static/ds/ui_kits/queuelens/AuditLog.jsx?v=0.8.7"></script>
<script type="text/babel" src="/static/ds/ui_kits/queuelens/Configuration.jsx?v=0.8.7"></script>
<script type="text/babel" src="/static/ds/ui_kits/queuelens/Users.jsx?v=0.8.7"></script>
<script type="text/babel" src="/static/ds/ui_kits/queuelens/Parking.jsx?v=0.8.7"></script>
<script type="text/babel" src="/static/ds/ui_kits/queuelens/QueueDetail.jsx?v=0.8.7"></script>
<script type="text/babel" src="/static/ds/ui_kits/queuelens/Topology.jsx?v=0.8.7"></script>
<script type="text/babel" src="/static/ds/ui_kits/queuelens/Composer.jsx?v=0.8.7"></script>
<script type="text/babel" src="/static/ds/ui_kits/queuelens/Alerts.jsx?v=0.8.7"></script>
<script type="text/babel" src="/static/ds/ui_kits/queuelens/Notifications.jsx?v=0.8.7"></script>
<script type="text/babel">
const { SidebarNav, TopBar, Alert, Icon } = window.__NS;
const S = window.QL.screens;

// Environments from /api/environments — profiles defined in QUEUELENS_ENVIRONMENTS_JSON.
const B = window.QL.broker || { environment: 'development', host: 'rabbitmq:5672', api: '', vhost: '/', live: true, latency: '—' };
const REMOTE_ENVS = window.QL.fetchEnvironments();
const ENVS = (REMOTE_ENVS.length ? REMOTE_ENVS : [{ id: B.environment, api: '', vhosts: [B.vhost], active: true }]).map((e) => ({
  id: e.id, label: e.id.toUpperCase(), host: B.host, api: e.api,
  vhosts: e.vhosts.map((v) => ({ id: v })), active: e.active, activeVhost: e.active_vhost,
}));
window.QL.ENVS = ENVS;
const ACTIVE_ENV = ENVS.find((e) => e.active) || ENVS[0];
function activateEnvironment(envId, vhost) {
  window.QL.postJson('/api/environments/activate', { environment: envId, vhost: vhost || undefined })
    .then(() => location.reload())
    .catch((e) => window.alert('Could not switch environment: ' + e.message));
}
window.QL.activateEnvironment = activateEnvironment;

const PALETTE_SCREENS = [
  ['dashboard', 'Dashboard', 'layout-grid'], ['queues', 'Queues', 'list'],
  ['parking', 'Parking', 'flag'], ['topology', 'Topology', 'git-fork'], ['composer', 'Test Composer', 'send'],
  ['audit', 'Audit Log', 'clipboard-list'], ['alerts', 'Alerts', 'bell-ring'],
  ['config', 'Configuration', 'settings'], ['users', 'Users', 'users'], ['notifications', 'Notifications', 'bell'],
];

function CommandPalette({ open, onClose, nav }) {
  const [q, setQ] = React.useState('');
  const ref = React.useRef(null);
  React.useEffect(() => { if (open) { setQ(''); setTimeout(() => ref.current && ref.current.focus(), 60); } }, [open]);
  if (!open) return null;
  const ql = q.toLowerCase();
  const screens = PALETTE_SCREENS.filter((s) => s[1].toLowerCase().includes(ql));
  const queues = window.QL.data.queues.map((x) => x.name).filter((n) => n.includes(ql)).slice(0, 6);
  const first = queues.length ? { type: 'queue', v: queues[0] } : screens.length ? { type: 'screen', v: screens[0] } : null;
  const go = (item) => { onClose(); if (item.type === 'screen') nav(item.v[0]); else nav('queuedetail', { queue: item.v }); };
  const rowStyle = { display: 'flex', alignItems: 'center', gap: 10, width: '100%', textAlign: 'left', padding: '9px 12px', border: 'none', borderRadius: 8, cursor: 'pointer', background: 'transparent', fontFamily: 'var(--font-ui)', fontSize: 13.5, color: 'var(--slate-700)' };
  const label = { padding: '8px 12px 2px', fontSize: 11, fontWeight: 600, letterSpacing: 'var(--tracking-caps)', textTransform: 'uppercase', color: 'var(--text-muted)' };
  return (
    <div onClick={onClose} style={{ position: 'fixed', inset: 0, background: 'rgba(8, 12, 22, 0.45)', zIndex: 100, display: 'flex', justifyContent: 'center', alignItems: 'flex-start', paddingTop: 110 }}>
      <div onClick={(e) => e.stopPropagation()} style={{ width: 560, maxHeight: 440, overflow: 'auto', background: 'var(--surface-raised)', border: '1px solid var(--border-default)', borderRadius: 12, boxShadow: 'var(--shadow-popover)', padding: 8, fontFamily: 'var(--font-ui)' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '6px 12px 10px', borderBottom: '1px solid var(--slate-100)' }}>
          <Icon name="search" size={16} color="var(--slate-400)" />
          <input ref={ref} value={q} onChange={(e) => setQ(e.target.value)}
            onKeyDown={(e) => { if (e.key === 'Enter' && first) go(first); }}
            placeholder="Jump to a queue or screen…"
            style={{ flex: 1, border: 'none', outline: 'none', background: 'transparent', fontFamily: 'var(--font-ui)', fontSize: 14.5, color: 'var(--slate-900)' }} />
          <span style={{ fontSize: 11, fontFamily: 'var(--font-mono)', color: 'var(--slate-400)', border: '1px solid var(--border-default)', borderRadius: 5, padding: '1px 6px' }}>esc</span>
        </div>
        {queues.length > 0 && <div style={label}>Queues</div>}
        {queues.map((n) => (
          <button key={n} style={rowStyle} onClick={() => go({ type: 'queue', v: n })}
            onMouseEnter={(e) => e.currentTarget.style.background = 'var(--slate-50)'} onMouseLeave={(e) => e.currentTarget.style.background = 'transparent'}>
            <Icon name={n.includes('dlq') ? 'alert-triangle' : 'list'} size={14} color={n.includes('dlq') ? 'var(--red-600)' : 'var(--slate-400)'} />
            <span style={{ fontFamily: 'var(--font-mono)', fontSize: 12.5 }}>{n}</span>
          </button>
        ))}
        {screens.length > 0 && <div style={label}>Screens</div>}
        {screens.map((s) => (
          <button key={s[0]} style={rowStyle} onClick={() => go({ type: 'screen', v: s })}
            onMouseEnter={(e) => e.currentTarget.style.background = 'var(--slate-50)'} onMouseLeave={(e) => e.currentTarget.style.background = 'transparent'}>
            <Icon name={s[2]} size={14} color="var(--slate-400)" />{s[1]}
          </button>
        ))}
        {screens.length === 0 && queues.length === 0 && <div style={{ padding: '18px 12px', fontSize: 13, color: 'var(--slate-400)' }}>No matches.</div>}
      </div>
    </div>
  );
}

function OfflineState({ envObj, onRetry, nav }) {
  const { EmptyState } = window.QL;
  const { Button } = window.__NS;
  return (
    <div style={{ padding: '60px 0' }}>
      <EmptyState icon="unplug" tone="danger" title="Cannot reach the broker"
        actions={<React.Fragment>
          <Button icon="refresh-cw" onClick={onRetry}>Retry connection</Button>
          <Button variant="secondary" onClick={() => nav('config')}>View Configuration</Button>
        </React.Fragment>}>
        {envObj.api} is not responding. Check that the RabbitMQ Management API is reachable and credentials are valid. Queues and messages are unavailable until the connection is restored.
      </EmptyState>
    </div>
  );
}

function App() {
  // Auth is HTTP Basic, enforced by the server before this page loads — no in-app login step.
  const [route, setRoute] = React.useState({ id: 'dashboard', params: {} });
  const [bellOpen, setBellOpen] = React.useState(false);
  const [envId] = React.useState(ACTIVE_ENV.id);
  const [vhost] = React.useState(ACTIVE_ENV.activeVhost || B.vhost || '/');
  const brokerLive = B.live !== false;
  const [paletteOpen, setPaletteOpen] = React.useState(false);
  const [theme, setTheme] = React.useState(localStorage.getItem('ql_theme') || 'light');
  React.useEffect(() => {
    const h = (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k') { e.preventDefault(); setPaletteOpen((o) => !o); }
      if (e.key === 'Escape') setPaletteOpen(false);
    };
    window.addEventListener('keydown', h);
    return () => window.removeEventListener('keydown', h);
  }, []);
  React.useEffect(() => {
    document.documentElement.setAttribute('data-theme', theme);
    localStorage.setItem('ql_theme', theme);
  }, [theme]);
  const envObj = ENVS.find((e) => e.id === envId) || ENVS[0];
  const switchEnv = (id) => activateEnvironment(id, null);  // real switch: server re-points, page reloads
  const nav = (id, params = {}) => { setRoute({ id, params }); setBellOpen(false); window.scrollTo(0, 0); };

  const screenLabelMap = {
    dashboard: 'Dashboard', queues: 'Queues', messages: 'Messages', replay: 'Replay',
    parking: 'Parking', queuedetail: 'Queue Detail', topology: 'Topology', composer: 'Composer',
    audit: 'Audit Log', alerts: 'Alerts', config: 'Configuration', users: 'Users', notifications: 'Notifications',
  };
  // Messages and the Replay/Park wizard are contextual screens reached from a queue,
  // so they highlight their parent nav item instead of having sidebar entries.
  const activeNav = ['messages', 'replay', 'queuedetail'].includes(route.id) ? 'queues' : route.id;

  let screen = null;
  if (route.id === 'dashboard') screen = <S.Dashboard nav={nav} empty={(window.QL.data.queues || []).length === 0} />;
  else if (route.id === 'queues') screen = <S.Queues nav={nav} />;
  else if (route.id === 'messages') screen = <S.Messages nav={nav} queue={route.params.queue || window.QL.defaultQueue} fingerprint={route.params.fingerprint || null} />;
  else if (route.id === 'replay') screen = <S.Wizard nav={nav} mode={route.params.mode || (route.id === 'parking' ? 'park' : 'move')} msg={route.params.msg || window.QL.data.messages[0]} count={route.params.count || 1} fingerprints={route.params.fingerprints || null} />;
  else if (route.id === 'parking') screen = <S.Parking nav={nav} />;
  else if (route.id === 'queuedetail') screen = <S.QueueDetail nav={nav} queue={route.params.queue || window.QL.defaultQueue} />;
  else if (route.id === 'topology') screen = <S.Topology nav={nav} />;
  else if (route.id === 'composer') screen = <S.Composer nav={nav} />;
  else if (route.id === 'alerts') screen = <S.Alerts nav={nav} />;
  else if (route.id === 'audit') screen = <S.AuditLog nav={nav} />;
  else if (route.id === 'config') screen = <S.Configuration nav={nav} envs={ENVS} activeEnv={envId} vhost={vhost} onEnvChange={switchEnv} />;
  else if (route.id === 'notifications') screen = <S.Notifications nav={nav} />;
  else if (route.id === 'users') screen = <S.Users nav={nav} />;
  else screen = (
    <div style={{ padding: '80px 0', textAlign: 'center', color: 'var(--slate-400)', fontSize: 14 }}>
      {screenLabelMap[route.id] || route.id} — not represented in the source screenshots; intentionally left blank.
    </div>
  );

  if (!brokerLive && !['config', 'users'].includes(route.id)) {
    screen = <OfflineState envObj={envObj} onRetry={() => location.reload()} nav={nav} />;
  }

  return (
    <div style={{ display: 'flex', minHeight: '100vh', alignItems: 'stretch' }} data-screen-label={screenLabelMap[route.id] || route.id}>
      <SidebarNav
        activeId={activeNav} onNavigate={(id) => nav(id)}
        groups={[
          { label: 'Main', items: [
            { id: 'dashboard', label: 'Dashboard', icon: 'layout-grid' },
            { id: 'queues', label: 'Queues', icon: 'list' },
            { id: 'parking', label: 'Parking', icon: 'flag' },
            { id: 'topology', label: 'Topology', icon: 'git-fork' },
            { id: 'composer', label: 'Composer', icon: 'send' },
            { id: 'audit', label: 'Audit Log', icon: 'clipboard-list' } ] },
          { label: 'Settings', items: [
            { id: 'alerts', label: 'Alerts', icon: 'bell-ring' },
            { id: 'config', label: 'Configuration', icon: 'settings' },
            { id: 'users', label: 'Users', icon: 'users' } ] }]}
        broker={{ host: envObj.host, vhost: vhost, latency: B.latency || '—', offline: !brokerLive }}
        safety={['Non-destructive browsing', 'Publish-before-ack', 'Audit everything', 'Messages never lost']}
        user={{ initials: (window.QL.user || 'ad').slice(0, 2).toUpperCase(), name: window.QL.user || 'admin', role: 'Administrator' }}
      />
      <div style={{ flex: 1, minWidth: 0, position: 'relative', background: 'var(--surface-page)' }}>
        <TopBar version={B.api} userName={window.QL.user || 'admin'} notifications={window.QL.alertCount || 0} onBell={() => setBellOpen(!bellOpen)}
          envs={ENVS} activeEnv={envId} onEnvChange={switchEnv}
          vhosts={envObj.vhosts} vhost={vhost} onVhostChange={(v) => activateEnvironment(envId, v)}
          brokerLive={brokerLive}
          theme={theme} onThemeToggle={() => setTheme(theme === 'dark' ? 'light' : 'dark')}
          onRefresh={() => location.reload()}
          lastRefreshed={brokerLive ? 'just now' : '—'} />
        {bellOpen && <window.QL.NotificationsPopover onViewAll={() => nav('notifications')} onClose={() => setBellOpen(false)} />}
        <CommandPalette open={paletteOpen} onClose={() => setPaletteOpen(false)} nav={nav} />
        <main style={{ padding: '24px 32px 40px', maxWidth: 1400, margin: '0 auto' }}>
          {envId === 'production' && (
            <Alert tone="danger" icon="shield-alert" title="You are connected to PRODUCTION." style={{ marginBottom: 20 }}>
              Destructive actions require type-to-confirm. All operations are audited with environment and vhost.
            </Alert>
          )}
          {screen}
        </main>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
