<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ status_code }} · QueueLens</title>
<style>
  body { margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
         background: #f8fafc; color: #0f172a; font-family: system-ui, sans-serif; }
  .card { text-align: center; padding: 40px 48px; background: #fff; border: 1px solid #e2e8f0;
          border-radius: 14px; box-shadow: 0 8px 30px rgba(15, 23, 42, .06); }
  .code { font-size: 56px; font-weight: 700; margin: 0 0 6px; color: #4f46e5; }
  p { margin: 0 0 22px; color: #475569; max-width: 420px; }
  a { display: inline-block; padding: 9px 20px; border-radius: 9px; text-decoration: none;
      font-weight: 600; font-size: 14px; background: #4f46e5; color: #fff; }
</style>
</head>
<body>
  <div class="card">
    <p class="code">{{ status_code }}</p>
    <p>{{ detail }}</p>
    <a href="/app">Back to the console</a>
  </div>
</body>
</html>
