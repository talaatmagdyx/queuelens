{% extends "base.html" %}
{% block title %}Audit Log · QueueLens{% endblock %}
{% block content %}
<h1>Audit Log</h1>
<section class="card"><table><thead><tr><th>Time</th><th>User</th><th>Action</th><th>Queue</th><th>Result</th></tr></thead>
<tbody>{% for event in events %}<tr><td>{{ event.timestamp }}</td><td>{{ event.username }}</td><td>{{ event.action }}</td><td>{{ event.source_queue }}</td><td>{{ event.result }}</td></tr>{% endfor %}</tbody></table></section>
{% endblock %}
